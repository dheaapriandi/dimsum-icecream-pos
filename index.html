<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kedai AA POS" />
    <title>Kedai AA - POS Kasir Pintar</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(220, 38, 38, 0.95)';
        div.style.color = 'white';
        div.style.padding = '24px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.overflow = 'auto';
        div.innerHTML = '<h2 style="margin-top:0;">⚠️ Uncaught JS Error:</h2>' +
          '<p><strong>Message:</strong> ' + message + '</p>' +
          '<p><strong>Source:</strong> ' + source + '</p>' +
          '<p><strong>Line:</strong> ' + lineno + ':' + colno + '</p>' +
          '<p><strong>Stack:</strong> ' + (error && error.stack ? error.stack : 'N/A') + '</p>';
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(217, 119, 6, 0.95)';
        div.style.color = 'white';
        div.style.padding = '24px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.overflow = 'auto';
        div.innerHTML = '<h2 style="margin-top:0;">⚠️ Unhandled Promise Rejection:</h2>' +
          '<p><strong>Reason:</strong> ' + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + '</p>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker terdaftar!', reg);
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('Konten baru terdeteksi, merefresh aplikasi...');
                      window.location.reload();
                    }
                  };
                }
              };
            })
            .catch(err => console.error('Gagal mendaftarkan Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
